<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDYMANIA Score & Ranking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-weight: 500;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #d97f3e 0%, #c9632b 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 5px solid #b8521f;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .mode-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .mode-btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            background: #f0f0f0;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .mode-btn.active {
            background: #d97f3e;
            color: white;
        }

        .mode-btn:hover {
            background: #e0e0e0;
        }

        .mode-btn.active:hover {
            background: #c9632b;
        }

        /* モード選択画面 */
        .mode-selection-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 40px;
        }

        .selection-content {
            text-align: center;
            max-width: 600px;
        }

        .selection-content h2 {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .selection-content p {
            font-size: 16px;
            color: #999;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .selection-buttons {
            display: flex;
            gap: 30px;
            flex-direction: column;
        }

        .selection-btn {
            padding: 40px;
            border: none;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
            border: 2px solid #d97f3e;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .selection-btn:hover {
            background: linear-gradient(135deg, #efd6bf 0%, #e8d4b8 100%);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(217, 127, 62, 0.2);
        }

        .selection-title {
            font-size: 24px;
            font-weight: 700;
            color: #d97f3e;
            margin-bottom: 10px;
        }

        .selection-desc {
            font-size: 14px;
            color: #999;
            letter-spacing: 1px;
        }

        .mode-selection-screen.hidden {
            display: none;
        }

        .content {
            padding: 40px;
            display: none;
            min-height: 600px;
            animation: fadeIn 0.5s ease;
        }

        .content.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 台車用：合計ポイント表示 */
        .total-points-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .player-total {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .player-name {
            font-size: 18px;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .player-score {
            font-size: 120px;
            font-weight: 700;
            color: #d97f3e;
            line-height: 1;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .player-score.updated {
            animation: scoreUpdate 0.6s ease;
        }

        @keyframes scoreUpdate {
            0% {
                transform: scale(1);
                color: #d97f3e;
            }
            50% {
                transform: scale(1.15);
                color: #f5a55f;
            }
            100% {
                transform: scale(1);
                color: #d97f3e;
            }
        }

        .points-label {
            font-size: 16px;
            color: #999;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* プロジェクター3用：ランキング表示 */
        .ranking-display {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .current-game {
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .current-game-title {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .current-scores {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .current-player {
            text-align: center;
            min-width: 200px;
        }

        .current-player-name {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .current-score {
            font-size: 48px;
            font-weight: 700;
            color: #d97f3e;
            font-family: 'Courier New', monospace;
        }

        .ranking-section {
            flex: 1;
        }

        .ranking-title {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 4px solid #d97f3e;
            transition: all 0.3s ease;
        }

        .ranking-item.top-5-entry {
            animation: topEntryAnimation 0.8s ease;
            background: linear-gradient(135deg, #fff4e6 0%, #fff9f0 100%);
            border-left-color: #f5a55f;
        }

        @keyframes topEntryAnimation {
            0% {
                transform: translateX(-20px);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .rank-number {
            font-size: 32px;
            font-weight: 700;
            color: #d97f3e;
            min-width: 60px;
            font-family: 'Courier New', monospace;
        }

        .rank-info {
            flex: 1;
        }

        .rank-name {
            font-size: 16px;
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .rank-date {
            font-size: 12px;
            color: #999;
            letter-spacing: 0.5px;
        }

        .rank-score {
            font-size: 28px;
            font-weight: 700;
            color: #d97f3e;
            font-family: 'Courier New', monospace;
            min-width: 120px;
            text-align: right;
        }

        /* テスト用セクション */
        .test-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .test-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .test-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .test-input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .test-btn {
            padding: 10px 20px;
            background: #d97f3e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .test-btn:hover {
            background: #c9632b;
        }

        /* フラッシュ演出 */
        .flash-animation {
            animation: flash 0.6s ease;
        }

        @keyframes flash {
            0%, 100% {
                background: white;
            }
            50% {
                background: #fff4e6;
            }
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #d97f3e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANDYMANIA</h1>
            <p>Score & Ranking System</p>
        </div>

        <div style="padding: 20px 40px; background: white;">
            <div id="mode-selection-screen" class="mode-selection-screen">
                <div class="selection-content">
                    <h2>Display Mode</h2>
                    <p>表示モードを選択してください</p>
                    <div class="selection-buttons">
                        <button class="selection-btn" onclick="selectMode('total')">
                            <div class="selection-title">台車表示</div>
                            <div class="selection-desc">合計ポイント表示用</div>
                        </button>
                        <button class="selection-btn" onclick="selectMode('ranking')">
                            <div class="selection-title">プロジェクター表示</div>
                            <div class="selection-desc">ランキング・スコア表示用</div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 台車用：合計ポイント表示 -->
        <div id="total-mode" class="content active">
            <div class="total-points-display">
                <div class="player-total">
                    <div class="player-name">Player 1</div>
                    <div class="player-score" id="player1-total">0</div>
                    <div class="points-label">Total Points</div>
                </div>
                <div class="player-total">
                    <div class="player-name">Player 2</div>
                    <div class="player-score" id="player2-total">0</div>
                    <div class="points-label">Total Points</div>
                </div>
            </div>

            <div class="test-section">
                <div class="test-title">Test Controls</div>
                <div class="test-controls">
                    <input type="number" id="p1-score" class="test-input" placeholder="Player 1 Score" value="0">
                    <input type="number" id="p2-score" class="test-input" placeholder="Player 2 Score" value="0">
                    <button class="test-btn" onclick="addScore()">Add Score</button>
                    <button class="test-btn" onclick="resetScores()">Reset</button>
                </div>
            </div>
        </div>

        <!-- プロジェクター3用：ランキング表示 -->
        <div id="ranking-mode" class="content">
            <div class="current-game">
                <div class="current-game-title">Current Game</div>
                <div class="current-scores">
                    <div class="current-player">
                        <div class="current-player-name">Player 1</div>
                        <div class="current-score" id="current-p1">-</div>
                    </div>
                    <div class="current-player">
                        <div class="current-player-name">Player 2</div>
                        <div class="current-score" id="current-p2">-</div>
                    </div>
                </div>
            </div>

            <div class="ranking-section">
                <div class="ranking-title">Top 5 Ranking</div>
                <div class="ranking-list" id="ranking-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading ranking data...
                    </div>
                </div>
            </div>

            <div class="test-section">
                <div class="test-title">Test Controls</div>
                <div class="test-controls">
                    <input type="text" id="test-name" class="test-input" placeholder="Player Name" value="Test Player">
                    <input type="number" id="test-score" class="test-input" placeholder="Score" value="5000">
                    <button class="test-btn" onclick="submitTestScore()">Submit Score</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase SDKインポート
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyAaKPddAgfpi4A4-yJ-MmgWfDpSA7llOQs",
            authDomain: "andy-mania-score-system.firebaseapp.com",
            projectId: "andy-mania-score-system",
            databaseURL: "https://andy-mania-score-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "andy-mania-score-system.firebasestorage.app",
            messagingSenderId: "765511734997",
            appId: "1:765511734997:web:e6fc4f09fa2b254590b45c"
        };

        // Firebase初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let totalPoints = { player1: 0, player2: 0 };
        let currentGameScores = { player1: null, player2: null };
        let rankings = [];
        const TOP_5_THRESHOLD = 5;

        // モード切り替え
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const mode = this.dataset.mode;
                switchMode(mode);
            });
        });

        function switchMode(mode) {
            // 選択画面を非表示
            document.getElementById('mode-selection-screen').classList.add('hidden');
            
            // 全コンテンツを非表示
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));

            // 選択されたモードを表示
            if (mode === 'total') {
                document.getElementById('total-mode').classList.add('active');
            } else {
                document.getElementById('ranking-mode').classList.add('active');
            }
        }

        // グローバルスコープで selectMode を定義（HTMLボタンから呼び出す）
        window.selectMode = function(mode) {
            switchMode(mode);
        };

        // リアルタイムリスナー：合計ポイント
        onValue(ref(db, 'total_points'), (snap) => {
            const data = snap.val();
            if (data) {
                totalPoints.player1 = data.player1 || 0;
                totalPoints.player2 = data.player2 || 0;
                updateTotalDisplay();
            }
        });

        // リアルタイムリスナー：現在のゲームスコア
        onValue(ref(db, 'current_game'), (snap) => {
            const data = snap.val();
            if (data) {
                currentGameScores.player1 = data.player1 || '-';
                currentGameScores.player2 = data.player2 || '-';
                updateCurrentScores();
            }
        });

        // リアルタイムリスナー：ランキング
        onValue(ref(db, 'rankings'), (snap) => {
            const data = snap.val();
            rankings = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    rankings.push(data[key]);
                });
            }
            rankings.sort((a, b) => b.score - a.score);
            updateRankingDisplay();
        });

        function updateTotalDisplay() {
            const p1Elem = document.getElementById('player1-total');
            const p2Elem = document.getElementById('player2-total');

            p1Elem.classList.remove('updated');
            p2Elem.classList.remove('updated');

            setTimeout(() => {
                p1Elem.textContent = totalPoints.player1;
                p2Elem.textContent = totalPoints.player2;
                p1Elem.classList.add('updated');
                p2Elem.classList.add('updated');
            }, 10);
        }

        function updateCurrentScores() {
            document.getElementById('current-p1').textContent = currentGameScores.player1;
            document.getElementById('current-p2').textContent = currentGameScores.player2;
        }

        function updateRankingDisplay() {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';

            if (rankings.length === 0) {
                list.innerHTML = '<div class="loading">No ranking data yet</div>';
                return;
            }

            rankings.slice(0, 5).forEach((rank, index) => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                item.innerHTML = `
                    <div class="rank-number">${index + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${rank.name || 'Unknown'}</div>
                        <div class="rank-date">${rank.date || 'N/A'}</div>
                    </div>
                    <div class="rank-score">${rank.score}</div>
                `;
                list.appendChild(item);
            });
        }

        // テスト用：スコア追加
        function addScore() {
            const p1 = parseInt(document.getElementById('p1-score').value) || 0;
            const p2 = parseInt(document.getElementById('p2-score').value) || 0;

            db.ref('total_points').set({
                player1: p1,
                player2: p2
            });
        }

        function resetScores() {
            db.ref('total_points').set({ player1: 0, player2: 0 });
            document.getElementById('p1-score').value = '0';
            document.getElementById('p2-score').value = '0';
        }

        function submitTestScore() {
            const name = document.getElementById('test-name').value;
            const score = parseInt(document.getElementById('test-score').value) || 0;
            const date = new Date().toLocaleDateString('ja-JP');

            const newRank = {
                name: name,
                score: score,
                date: date,
                timestamp: Date.now()
            };

            db.ref('rankings').push(newRank);

            // Top 5入賞時の演出
            if (rankings.length < TOP_5_THRESHOLD || score > Math.min(...rankings.slice(0, 5).map(r => r.score))) {
                playTopEntryAnimation();
                playChimeSound();
            }
        }

        function playTopEntryAnimation() {
            const container = document.querySelector('.container');
            container.classList.add('flash-animation');
            setTimeout(() => container.classList.remove('flash-animation'), 600);
        }

        function playChimeSound() {
            // Web Audio API でチャイム音を生成
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;

            // 音色1（高音）
            const osc1 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.connect(gain1);
            gain1.connect(audioContext.destination);
            osc1.frequency.value = 800;
            gain1.gain.setValueAtTime(0.3, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc1.start(now);
            osc1.stop(now + 0.5);

            // 音色2（中音）
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 600;
            gain2.gain.setValueAtTime(0.25, now + 0.1);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
            osc2.start(now + 0.1);
            osc2.stop(now + 0.7);
        }

        // 初期化
        updateTotalDisplay();
        updateRankingDisplay();
    </script>
</body>
</html>
